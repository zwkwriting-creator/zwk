<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZWK Writing LLC | Modern IT & AI Solutions</title>
<h1>ZWK Writing LLC</h1>
<p>Choose a plan</p>

<button onclick="buy('basic')">Basic - $10</button>
<button onclick="buy('standard')">Standard - $25</button>
<button onclick="buy('premium')">Premium - $50</button>

<script>
async function buy(plan) {
  const res = await fetch("/.netlify/functions/create-checkout-session", {
    method: "POST",
    body: JSON.stringify({ plan })
  });

  const data = await res.json();

  if (data.url) {
    window.location.href = data.url;
  } else {
    alert("Checkout failed");
  }
}
</script>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b1220;
    color: #fff;
}

header {
    display: flex;
    justify-content: space-between;
    padding: 18px 40px;
    background: #020617;
    position: sticky;
    top: 0;
}

nav { display: flex; gap: 15px; }

nav a {
    color: white;
    text-decoration: none;
}

.hero {
    text-align: center;
    padding: 80px 20px;
    background: #111c33;
}

.section {
    padding: 70px 20px;
    text-align: center;
}

.cards {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
}

.card {
    background: #111c33;
    padding: 20px;
    border-radius: 12px;
    width: 260px;
}

.btn {
    padding: 12px 18px;
    background: #3b82f6;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}
</style>
</head>

<body>

    <nav>
        <a href="#home">Home</a>
        <a href="#services">Services</a>
        <a href="#pricing">Pricing</a>
        <a href="#booking">Book</a>
    </nav>
</header>

<!-- HERO -->
<section class="hero" id="home">
    <h1>AI-Powered IT & Business Solutions</h1>
    <p>We build systems, automation, and infrastructure that scale.</p>

    <button class="btn" onclick="buy('basic')">Buy Now</button>
</section>

<!-- SERVICES -->
<section class="section" id="services">
    <h2>Services</h2>

    <div class="cards">
        <div class="card"><h3>IT Support</h3></div>
        <div class="card"><h3>Networking</h3></div>
        <div class="card"><h3>AI Automation</h3></div>
    </div>
</section>

<!-- PRICING -->
<section class="section" id="pricing">
    <h2>Pricing</h2>

    <div class="cards">
        <div class="card">
            <h3>Basic $10</h3>
            <button class="btn" onclick="buy('basic')">Buy</button>
        </div>

        <div class="card">
            <h3>Standard $25</h3>
            <button class="btn" onclick="buy('standard')">Buy</button>
        </div>

        <div class="card">
            <h3>Premium $50</h3>
            <button class="btn" onclick="buy('premium')">Buy</button>
        </div>
    </div>
</section>

<!-- BOOKING -->
<section class="section" id="booking">
    <h2>Book a Call</h2>

    <input id="name" placeholder="Name"><br><br>
    <input id="email" placeholder="Email"><br><br>
    <input id="date" type="date"><br><br>
    <textarea id="details" placeholder="Details"></textarea><br><br>

    <button class="btn" onclick="book()">Submit</button>
</section>

<footer style="text-align:center; padding:20px;">
    © 2026 ZWK Writing LLC
</footer>

<script>
async function buy(plan) {
    const res = await fetch("/.netlify/functions/create-checkout-session", {
        method: "POST",
        body: JSON.stringify({ plan })
    });

    const data = await res.json();

    if (data.url) {
        window.location.href = data.url;
    } else {
        alert("Checkout failed");
    }
}

function book(){
    const data = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        date: document.getElementById('date').value,
        details: document.getElementById('details').value
    };

    fetch('/.netlify/functions/book', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify(data)
    })
    .then(res => alert(res.ok ? "Booking sent!" : "Error"))
}
</script>

</body>
</html>
